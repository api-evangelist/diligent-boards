name: Diligent
kind: company
description: Diligent Corporation is a governance, risk, and compliance (GRC)
  software company best known for its board management portal (Diligent Boards /
  Boardbooks) and the broader Diligent One Platform, which unifies board
  management, enterprise risk, audit, compliance, entity management, and ESG. The
  board portal itself is a security-hardened product with no public developer API -
  it is integrated through SSO (SAML 2.0), SCIM provisioning, and packaged
  connectors (Okta, Microsoft 365/Teams, Zoom, DocuSign). Diligent does, however,
  publish a real developer portal at developer.diligent.com covering the GRC side
  of the platform - the HighBond (Diligent One) REST API for audit/risk/compliance
  data, a GraphQL Entities API for legal-entity and subsidiary management, an ESG
  API for activity/usage data, and a Workflow API for jobs, tasks, and campaigns.
  API access is customer/partner-gated (a HighBond API key or SSO-scoped token is
  required) and pricing is quote-based via Diligent sales.
